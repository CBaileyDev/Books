name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci --no-audit --no-fund

      - name: Assemble static site
        run: |
          set -e
          mkdir -p _site/pdfjs/build _site/pdfjs/web _site/pdfjs/cmaps _site/pdfjs/standard_fonts _site/content
          cp -r public/. _site/
          if [ -d Content ] && [ -n "$(ls -A Content 2>/dev/null)" ]; then
            cp -r Content/. _site/content/
          fi
          cp node_modules/pdfjs-dist/build/pdf.min.js _site/pdfjs/build/
          cp node_modules/pdfjs-dist/build/pdf.worker.min.js _site/pdfjs/build/
          cp node_modules/pdfjs-dist/web/pdf_viewer.css _site/pdfjs/web/
          cp -r node_modules/pdfjs-dist/cmaps/. _site/pdfjs/cmaps/
          cp -r node_modules/pdfjs-dist/standard_fonts/. _site/pdfjs/standard_fonts/
          node scripts/build-books-json.js _site/books.json
          # Disable Jekyll so files starting with _ are served as-is
          touch _site/.nojekyll

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
