<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Library</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@300;400;500;600;700&display=swap"
    />
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="pdfjs/web/pdf_viewer.css" />
  </head>
  <body>
    <div id="app">
      <!-- LIBRARY -->
      <section id="library" class="view active">
        <header class="library-header">
          <div class="brand">
            <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
              <path
                fill="currentColor"
                d="M5 4a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16l-7-3-7 3V4Z"
              />
            </svg>
            <span>Library</span>
          </div>
          <div class="library-meta" id="libraryMeta"></div>
        </header>
        <div class="library-grid" id="libraryGrid"></div>
        <div class="library-empty" id="libraryEmpty" hidden>
          <h2>Your library is empty</h2>
          <p>Drop a PDF into the <code>Content</code> folder and refresh.</p>
        </div>
      </section>

      <!-- READER -->
      <section id="reader" class="view">
        <header class="reader-header">
          <button class="icon-btn" id="backBtn" title="Back to library (Esc)">
            <svg viewBox="0 0 24 24" width="18" height="18">
              <path
                fill="currentColor"
                d="M15.5 4 7 12.5l8.5 8.5 1.4-1.4-7.1-7.1 7.1-7.1L15.5 4Z"
              />
            </svg>
          </button>
          <button class="icon-btn" id="toggleOutline" title="Contents (T)" hidden>
            <svg viewBox="0 0 24 24" width="18" height="18">
              <path
                fill="currentColor"
                d="M3 5h18v2H3V5Zm3 6h15v2H6v-2Zm-3 6h18v2H3v-2Z"
              />
            </svg>
          </button>
          <button class="icon-btn" id="toggleSearch" title="Search (Ctrl/Cmd+F)">
            <svg viewBox="0 0 24 24" width="18" height="18">
              <path
                fill="currentColor"
                d="M10 4a6 6 0 1 1-3.9 10.6l-4 4-1.4-1.4 4-4A6 6 0 0 1 10 4Zm0 2a4 4 0 1 0 0 8 4 4 0 0 0 0-8Z"
              />
            </svg>
          </button>
          <div class="reader-title">
            <span id="readerTitle"></span>
            <small id="readerAuthor"></small>
          </div>
          <div class="reader-tools">
            <button class="icon-btn" id="zoomOut" title="Zoom out (-)">
              <svg viewBox="0 0 24 24" width="18" height="18">
                <path fill="currentColor" d="M5 11h14v2H5z" />
              </svg>
            </button>
            <span id="zoomLabel" class="zoom-label">100%</span>
            <button class="icon-btn" id="zoomIn" title="Zoom in (+)">
              <svg viewBox="0 0 24 24" width="18" height="18">
                <path
                  fill="currentColor"
                  d="M11 5h2v6h6v2h-6v6h-2v-6H5v-2h6V5Z"
                />
              </svg>
            </button>
            <span class="divider"></span>
            <button class="icon-btn" id="toggleNotes" title="Notes panel (N)">
              <svg viewBox="0 0 24 24" width="18" height="18">
                <path
                  fill="currentColor"
                  d="M4 4h16v3H4V4Zm0 6h16v3H4v-3Zm0 6h10v3H4v-3Z"
                />
              </svg>
            </button>
          </div>
        </header>

        <main class="reader-main">
          <button class="page-edge left" id="prevEdge" aria-label="Previous page">
            <svg viewBox="0 0 24 24" width="22" height="22">
              <path
                fill="currentColor"
                d="M15 6 9 12l6 6 1.4-1.4L11.8 12l4.6-4.6L15 6Z"
              />
            </svg>
          </button>

          <div class="page-stage" id="pageStage">
            <div class="page-frame" id="pageFrame">
              <canvas id="pageCanvas"></canvas>
              <div id="textLayer" class="textLayer"></div>
              <div id="highlightLayer" class="highlight-layer"></div>
              <div id="loadingOverlay" class="loading-overlay">
                <div class="spinner"></div>
              </div>
            </div>
          </div>

          <button class="page-edge right" id="nextEdge" aria-label="Next page">
            <svg viewBox="0 0 24 24" width="22" height="22">
              <path
                fill="currentColor"
                d="m9 6 6 6-6 6-1.4-1.4L12.2 12 7.6 7.4 9 6Z"
              />
            </svg>
          </button>

          <!-- Selection toolbar -->
          <div id="selectionToolbar" class="selection-toolbar" hidden>
            <button data-color="yellow" class="hl-btn hl-yellow" title="Highlight"></button>
            <button data-color="green" class="hl-btn hl-green" title="Highlight"></button>
            <button data-color="blue" class="hl-btn hl-blue" title="Highlight"></button>
            <button data-color="pink" class="hl-btn hl-pink" title="Highlight"></button>
            <span class="tb-divider"></span>
            <button id="addNoteBtn" class="tb-btn" title="Add note">
              <svg viewBox="0 0 24 24" width="14" height="14">
                <path
                  fill="currentColor"
                  d="M3 5h18v2H3V5Zm0 6h18v2H3v-2Zm0 6h12v2H3v-2Z"
                />
              </svg>
              Note
            </button>
            <button id="removeHighlightBtn" class="tb-btn danger" hidden title="Remove">
              <svg viewBox="0 0 24 24" width="14" height="14">
                <path
                  fill="currentColor"
                  d="M6 7h12v2H6V7Zm2 3h8l-1 10H9L8 10Z"
                />
              </svg>
              Remove
            </button>
          </div>

          <!-- Note popup -->
          <div id="notePopup" class="note-popup" hidden>
            <div class="note-popup-quote" id="notePopupQuote"></div>
            <textarea
              id="notePopupText"
              placeholder="Write your thoughts…"
            ></textarea>
            <div class="note-popup-actions">
              <button class="btn ghost" id="noteCancel">Cancel</button>
              <button class="btn primary" id="noteSave">Save note</button>
            </div>
          </div>

          <!-- Left panel: Contents + Search -->
          <aside id="leftPanel" class="left-panel">
            <div class="lp-header">
              <div class="lp-tabs">
                <button class="lp-tab active" data-lp="outline">Contents</button>
                <button class="lp-tab" data-lp="search">Search</button>
              </div>
              <button class="icon-btn" id="closeLeftPanel" title="Close">
                <svg viewBox="0 0 24 24" width="16" height="16">
                  <path
                    d="m6 6 12 12M6 18 18 6"
                    stroke="currentColor"
                    stroke-width="2"
                    fill="none"
                  />
                </svg>
              </button>
            </div>
            <div class="lp-pane active" id="lpOutline">
              <div class="outline-tree" id="outlineTree"></div>
              <div class="lp-empty" id="outlineEmpty" hidden>
                This book has no table of contents.
              </div>
            </div>
            <div class="lp-pane" id="lpSearch">
              <div class="search-input-wrap">
                <svg viewBox="0 0 24 24" width="14" height="14">
                  <path
                    fill="currentColor"
                    d="M10 4a6 6 0 1 1-3.9 10.6l-4 4-1.4-1.4 4-4A6 6 0 0 1 10 4Zm0 2a4 4 0 1 0 0 8 4 4 0 0 0 0-8Z"
                  />
                </svg>
                <input
                  id="searchInput"
                  type="search"
                  placeholder="Search this book…"
                  autocomplete="off"
                />
              </div>
              <div class="search-status" id="searchStatus"></div>
              <div class="search-results" id="searchResults"></div>
            </div>
          </aside>

          <!-- Notes side panel -->
          <aside id="notesPanel" class="notes-panel">
            <div class="notes-panel-header">
              <h3>Notes &amp; Highlights</h3>
              <button class="icon-btn" id="closeNotes" title="Close">
                <svg viewBox="0 0 24 24" width="16" height="16">
                  <path
                    fill="currentColor"
                    d="m6 6 12 12M6 18 18 6"
                    stroke="currentColor"
                    stroke-width="2"
                    fill="none"
                  />
                </svg>
              </button>
            </div>
            <div class="notes-tabs">
              <button class="tab active" data-tab="all">All</button>
              <button class="tab" data-tab="notes">Notes</button>
              <button class="tab" data-tab="highlights">Highlights</button>
            </div>
            <div class="notes-list" id="notesList"></div>
          </aside>
        </main>

        <footer class="reader-footer">
          <button class="ctl-btn" id="firstBtn" title="First page (Home)">
            <svg viewBox="0 0 24 24" width="14" height="14">
              <path
                fill="currentColor"
                d="M6 4h2v16H6V4Zm12 0L9 12l9 8V4Z"
              />
            </svg>
          </button>
          <button class="ctl-btn" id="prevBtn" title="Previous (←)">
            <svg viewBox="0 0 24 24" width="14" height="14">
              <path
                fill="currentColor"
                d="M15 6 9 12l6 6 1.4-1.4L11.8 12l4.6-4.6L15 6Z"
              />
            </svg>
          </button>
          <div class="page-input-wrap">
            <input id="pageInput" type="number" min="1" />
            <span class="of">of <em id="pageCount">—</em></span>
          </div>
          <button class="ctl-btn" id="nextBtn" title="Next (→)">
            <svg viewBox="0 0 24 24" width="14" height="14">
              <path
                fill="currentColor"
                d="m9 6 6 6-6 6-1.4-1.4L12.2 12 7.6 7.4 9 6Z"
              />
            </svg>
          </button>
          <button class="ctl-btn" id="lastBtn" title="Last page (End)">
            <svg viewBox="0 0 24 24" width="14" height="14">
              <path
                fill="currentColor"
                d="M16 4h2v16h-2V4ZM6 4l9 8-9 8V4Z"
              />
            </svg>
          </button>
          <div class="progress-track" title="Progress">
            <div class="progress-fill" id="progressFill"></div>
          </div>
        </footer>
      </section>
    </div>

    <div id="toast" class="toast" hidden></div>

    <script src="pdfjs/build/pdf.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
